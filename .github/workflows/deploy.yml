name: Deploy to Hostinger

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} 72.60.93.231;
            mirror --reverse --only-newer --no-perms --exclude=^\.git --exclude=^\.github /home/runner/work/ISIL-site/ISIL-site/ /public_html/;
            quit
          "
