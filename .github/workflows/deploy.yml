name: Deploy to Hostinger

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: 72.60.93.231
        run: |
          cd "$GITHUB_WORKSPACE"
          lftp -u "$FTP_USER,$FTP_PASS" "ftp://$FTP_HOST" << 'ENDFTP'
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          mirror -R --no-perms --delete --exclude-glob=.git* --exclude-glob=.github* . /public_html/
          quit
          ENDFTP
