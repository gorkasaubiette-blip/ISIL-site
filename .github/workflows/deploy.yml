name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload files via FTP
        env:
          FTP_USER: u702380420
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: 72.60.93.231
        run: |
          find . -not -path './.git*' -not -path './.github*' -type f | while read f; do
            remote="${f#./}"
            echo "Uploading: $remote"
            curl -v --ftp-create-dirs \
              -T "$f" \
              "ftp://$FTP_HOST/public_html/$remote" \
              --user "$FTP_USER:$FTP_PASS" || exit 1
          done
          echo "Deploy terminé"
