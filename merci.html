<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — ISIL</title>
  <link rel="icon" type="image/png" href="isil-logo-trans.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #ECE7D8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 40px 20px;
    }
    .logo {
      height: 80px;
      width: auto;
      margin-bottom: 40px;
    }
    .merci-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 400;
      color: #1A2B35;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .merci-sub {
      font-size: 16px;
      font-weight: 300;
      color: rgba(26,43,53,0.65);
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 48px;
    }
    .back-link {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3A7593;
      text-decoration: none;
      border-bottom: 1px solid rgba(58,117,147,0.3);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }
    .back-link:hover { border-color: #3A7593; }
  </style>
</head>
<body>
  <img src="isil-logo-trans.png" alt="ISIL" class="logo">
  <h1 class="merci-title">Merci pour<br><em>votre demande.</em></h1>
  <p class="merci-sub">Nous avons bien reçu votre message et reviendrons vers vous sous 48h.</p>
  <a href="index.html" class="back-link">Retour au site</a>
</body>
</html>
